name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same branch — saves CI minutes and gives
# faster feedback on the latest push.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - run: pip install ruff==0.6.9
      - run: ruff check app tests
      - run: ruff format --check app tests

  test:
    name: pytest (unit + integration)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      # We deliberately do NOT install vllm or torch here — both pull
      # GPU wheels and are unnecessary for the test suite. The fake
      # engine in tests/integration/conftest.py stands in for the real
      # one. If a future test needs the real engine, it belongs in a
      # separate `gpu-test` job behind a self-hosted runner.
      - name: install (test deps only)
        run: |
          pip install --upgrade pip
          pip install \
            fastapi==0.115.0 \
            uvicorn==0.30.6 \
            python-multipart==0.0.12 \
            pydantic==2.9.2 \
            pydantic-settings==2.5.2 \
            Pillow==10.4.0 \
            numpy==1.26.4 \
            prometheus-client \
            structlog==24.4.0 \
            aiofiles==24.1.0 \
            httpx==0.27.2 \
            pytest==8.3.3 \
            pytest-asyncio==0.24.0 \
            pytest-cov==5.0.0
      - run: pytest tests/unit tests/integration -v --cov=app --cov-report=term-missing

  docker:
    name: docker build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      # Build only — pushing belongs in a separate release workflow with
      # registry credentials. CI builds prove the Dockerfile still works.
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
